[profile.default]
src = "src"
out = "out"
test = "test"
script = "script"
libs = ["lib"]
solc = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = false
verbosity = 2
fs_permissions = [{ access = "read", path = "./" }]

[profile.default.fuzz]
runs = 100

[profile.ci.fuzz]
runs = 1000

[fmt]
line_length = 120
tab_width = 4
quote_style = "double"
number_underscore = "thousands"
